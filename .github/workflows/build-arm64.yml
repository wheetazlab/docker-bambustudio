name: Build and Push BambuStudio arm64

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bambustudio-arm64

jobs:
  build:
    runs-on: mac-runner
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="${IMAGE}:sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          BRANCH_TAG="${IMAGE}:${{ github.ref_name }}"
          LATEST_TAG="${IMAGE}:latest"
          # Collect all tags as newline-separated for podman --tag args
          TAGS="${SHA_TAG} ${BRANCH_TAG} ${LATEST_TAG}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "primary=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Build image
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TAG_ARGS=""
          for tag in ${{ steps.tags.outputs.tags }}; do
            TAG_ARGS="$TAG_ARGS --tag $tag"
          done
          podman build \
            --file arm64/Dockerfile \
            --format docker \
            $TAG_ARGS \
            --label "org.opencontainers.image.created=${BUILD_DATE}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg VERSION="${{ github.ref_name }}" \
            arm64/

      - name: Push image
        run: |
          for tag in ${{ steps.tags.outputs.tags }}; do
            podman push "$tag"
          done
